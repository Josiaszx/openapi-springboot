openapi: 3.0.0
info:
  title: Documentacion de API con OpenApi
  version: 1.0.0
  description: Implementacion basica de OpenAPI

servers:
  - url: http://localhost:8080
    description: Servidor local

tags:
  - name: Users
    description: Manipulate users
  - name: Products
    description: Manipulate products
  - name: Employees
    description: Manipulate employees

paths:
  /api/users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Get all user from de database
      responses:
        '200':
          description: Lista de usuarios obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags:
        - Users
      summary: Save a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Usuario creado exitosamente
  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get user by id
      description: Get the user with the given id
      parameters:
        - name: id
          in: path
          required: true
          description: user id
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuario no encontrado
  /api/products:
    get:
      tags:
        - Products
      summary: Get all products
      description: Return a list of all the products in the database
      responses:
        '200':
          description: Lista de productos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      tags:
        - Products
      summary: Save a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Producto creado exitosamente
  /api/products/{id}:
    get:
      tags:
        - Products
      summary: Get product by id
      description: Return the product with the given id
      parameters:
        - name: id
          in: path
          required: true
          description: product id
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Producto no encontrado
  /api/employee:
    get:
      tags:
        - Employees
      summary: Get all employees
      description: Return a list of all the employees in the database
      responses:
        '200':
          description: Lista de empleados obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
    post:
      tags:
        - Employees
      summary: Save a new employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
      responses:
        '200':
          description: Empleado creado exitosamente
  /api/employee/{id}:
    get:
      tags:
        - Employees
      summary: Get employee by id
      description: Return the employee with the given id
      parameters:
        - name: id
          in: path
          required: true
          description: employee id
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Empleado encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          description: Empleado no encontrado

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID auto-generado del usuario
        username:
          type: string
          description: Nombre de usuario
        email:
          type: string
          format: email
          description: Correo electrónico del usuario
      example:
        id: 1
        username: "johndoe"
        email: "john@example.com"
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID auto-generado del producto
        name:
          type: string
          description: Nombre del producto
        price:
          type: integer
          description: Precio del producto en unidades enteras
      example:
        id: 1
        name: "Laptop"
        price: 1500
    Employee:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID del empleado
        name:
          type: string
          description: Nombre del empleado
        age:
          type: integer
          format: int16
          description: Edad del empleado
      example:
        id: 1
        name: "Alice Smith"
        age: 30